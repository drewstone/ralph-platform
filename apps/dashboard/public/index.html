<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ralph Forge</title>
    <style>
      body {
        margin: 0;
        background: #f3f4f6;
        color: #111827;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        max-width: 640px;
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 8px 30px rgba(17, 24, 39, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 20px;
      }
      p {
        margin: 8px 0;
        line-height: 1.5;
      }
      code {
        font-family: "IBM Plex Mono", SFMono-Regular, Menlo, monospace;
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Dashboard UI not built yet</h1>
        <p>
          The dashboard server is running, but compiled frontend assets were not found.
        </p>
        <p>
          Run <code>npm run -w @ralph/dashboard build:ui</code> then reload, or run
          <code>npm run -w @ralph/dashboard start</code> to build and start together.
        </p>
      </div>
    </div>
  </body>
</html>
